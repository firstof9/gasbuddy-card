name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to upload assets to'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and upload release asset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - run: npm ci
      - name: Inject Version
        run: |
          VERSION="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi
          VERSION_CLEAN="${VERSION#v}"
          sed -i "s/'VERSION'/'$VERSION_CLEAN'/g" src/gasbuddy-card.ts
      - run: npm run build
      - name: Upload card bundle
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: gasbuddy-card.js
          tag_name: ${{ github.event.inputs.tag || github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
