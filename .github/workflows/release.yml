name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to upload assets to'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and upload release asset
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - run: npm ci
      - name: Inject Version
        run: |
          VERSION="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi
          VERSION_CLEAN="${VERSION#v}"
          sed -i "s/'VERSION'/'$VERSION_CLEAN'/g" src/gasbuddy-card.ts
      - run: npm run build
      - name: Upload card bundle
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: gasbuddy-card.js
          tag_name: ${{ github.event.inputs.tag || github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
