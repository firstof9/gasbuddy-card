name: Autolabeler

on:
  pull_request:
    types: [opened, reopened, synchronize]
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions: {}

concurrency:
  group: ${{ format('al-{0}-pr-{1}', github.event_name, github.event.pull_request.number) }}
  cancel-in-progress: true

jobs:
  autolabel:
    name: Autolabel PR
    if: >
      (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.fork) ||
      (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork)
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: release-drafter/release-drafter/autolabeler@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7.5.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
